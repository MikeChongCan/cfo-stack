name: Setup Tests

on:
  pull_request:
    paths:
      - setup
      - uninstall
      - cfo_stack_setup.py
      - tests/**
      - .github/workflows/setup-tests.yml
  push:
    branches:
      - main
    paths:
      - setup
      - uninstall
      - cfo_stack_setup.py
      - tests/**
      - .github/workflows/setup-tests.yml
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Run test suite
        run: uv run --no-project --with pytest pytest
